name: Wardrobe
options:
  bundleIdPrefix: com.yuezhenchen
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    ALWAYS_SEARCH_USER_PATHS: "NO"
targets:
  Wardrobe:
    type: application
    platform: iOS
    sources:
      - path: Wardrobe
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuezhenchen.wardrobe
        PRODUCT_NAME: "Wardrobe"
        INFOPLIST_FILE: Wardrobe/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "4A4PLKBGTN"
        CODE_SIGN_STYLE: "Automatic"
        CODE_SIGN_IDENTITY: "Apple Development"
        GENERATE_INFOPLIST_FILE: "NO"
