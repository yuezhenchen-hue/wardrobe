name: Wardrobe
options:
  bundleIdPrefix: com.smartwardrobe
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    ALWAYS_SEARCH_USER_PATHS: "NO"
targets:
  Wardrobe:
    type: application
    platform: iOS
    sources:
      - path: Wardrobe
        excludes:
          - "Resources/Assets.xcassets"
          - "Info.plist"
    resources:
      - path: Wardrobe/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartwardrobe.app
        PRODUCT_NAME: "Wardrobe"
        INFOPLIST_FILE: Wardrobe/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
